# 商务报告模板
# 适用于: 项目计划、商务报告、季度总结

fonts:
  default: "Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif"
  heading: "Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif"
  code: "Noto Sans Mono CJK SC, Consolas, Courier New, monospace"
  western: "Arial, sans-serif"

font_sizes:
  body: 11
  h1: 20
  h2: 16
  h3: 14
  h4: 12
  h5: 11
  h6: 11
  caption: 10

colors:
  text: "#24292e"
  heading: "#1a365d"
  link: "#0366d6"
  table_border: "#d0d7de"
  table_header_bg: "#f6f8fa"
  table_zebra: "#fafbfc"
  code_bg: "#f6f8fa"
  blockquote_bg: "#f0f4f8"
  blockquote_border: "#1a365d"
  blockquote_text: "#4a5568"

spacing:
  line_height: 1.6
  paragraph_before: 0
  paragraph_after: 0.8

margins:
  top: "20mm"
  bottom: "20mm"
  left: "22mm"
  right: "22mm"

headings:
  h1:
    color: "#1a365d"
    border_bottom: "2px solid #1a365d"
    padding_bottom: "0.3em"
  h2:
    color: "#1a365d"
    border_bottom: "1px solid #e2e8f0"
    padding_bottom: "0.2em"
  h3:
    color: "#2d3748"
  h4:
    color: "#2d3748"

tables:
  border_collapse: true
  border_color: "#d0d7de"
  cell_padding: "8px 10px"
  header_bg: "#f6f8fa"
  header_color: "#1a365d"
  zebra: true
  font_size: 10.5

code_blocks:
  background: "#f6f8fa"
  border: "1px solid #d0d7de"
  border_left: "3px solid #1a365d"
  padding: "12px 14px"
  font_size: 10.5
  line_height: 1.5

blockquotes:
  border_left: "4px solid #1a365d"
  background: "#f0f4f8"
  padding: "10px 14px"
  color: "#4a5568"

page_break:
  h1_break_after: avoid
  h2_break_after: avoid
  table_break_inside: avoid
  pre_break_inside: avoid
