[pytest]
# E2E测试专用配置 - 覆盖全局pyproject.toml配置

# 关键配置：E2E测试必须串行执行
# 原因：避免多个worker同时写入SQLite导致的竞态条件（attempt to write a readonly database）
# -n 0 表示禁用pytest-xdist并行执行
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    --import-mode=importlib
    --timeout=30
    -W ignore::RuntimeWarning::0
    -W ignore::DeprecationWarning
    -W ignore::PendingDeprecationWarning
    -n 0

# Python路径: 添加项目根目录
pythonpath = ../..

# pytest-timeout配置：只计算测试函数本身的时间
timeout_func_only = true

# 统一标记管理来源，与根目录 pyproject.toml 保持一致
markers =
    unit: 单元测试 - 快速、隔离、业务逻辑验证
    integration: 集成测试 - 模块协作验证
    e2e: 端到端测试 - 完整系统验证
    serial: 串行测试 - 不与其他测试并行执行，避免状态干扰

# asyncio模式
asyncio_mode = auto
asyncio_default_test_loop_scope = session
